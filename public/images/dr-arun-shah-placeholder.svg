      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="1000" fill="url(#bg)" rx="24"/>
  <!-- Silhouette head -->
